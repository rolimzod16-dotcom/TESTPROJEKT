<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>HiveMonitor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #fef3c7 0%, #f5efe6 100%);
        font-family: Arial, sans-serif;
        color: #78350f;
      }
      .card {
        text-align: center;
        padding: 2rem;
      }
      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 1rem;
        border-radius: 24px;
        background: #f59e0b;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
      }
      p {
        color: #92400e;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🐝</div>
      <h1>HiveMonitor</h1>
      <p>Загрузка...</p>
    </div>
  </body>
</html>
